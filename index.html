<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a14">
<title>Spelling Master</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800;900&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   DESIGN TOKENS
══════════════════════════════════════════ */
:root {
  --bg:#0a0a14; --bg2:#12121f; --bg3:#1a1a2e; --border:#2a2a45;
  --accent:#7c6ff7; --accent2:#a78bfa; --green:#34d399; --red:#f87171;
  --yellow:#fbbf24; --text:#e8e8f0; --muted:#6b6b8a; --card:#16162a;

  /* fluid spacing & type — scales with viewport */
  --s1: clamp(6px,  1.2vw, 12px);
  --s2: clamp(10px, 2vw,   20px);
  --s3: clamp(14px, 2.5vw, 28px);
  --s4: clamp(18px, 3vw,   36px);

  --fs-xs:  clamp(10px, 1.1vw, 13px);
  --fs-sm:  clamp(12px, 1.4vw, 15px);
  --fs-md:  clamp(14px, 1.6vw, 17px);
  --fs-lg:  clamp(18px, 2.2vw, 26px);
  --fs-xl:  clamp(24px, 3.5vw, 40px);
  --fs-2xl: clamp(32px, 5vw,   60px);

  --radius-sm: clamp(8px, 1.2vw, 14px);
  --radius-md: clamp(12px, 1.8vw, 20px);
  --radius-lg: clamp(16px, 2.5vw, 28px);
}

/* ══════════════════════════════════════════
   RESET & BASE
══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); }
body {
  color: var(--text);
  font-family: 'Syne', 'Noto Sans SC', sans-serif;
  overflow: hidden; /* no scroll on body — inner panels scroll */
  display: flex; align-items: stretch;
}

/* ══════════════════════════════════════════
   APP SHELL
   Portrait  → full viewport, centered column
   Landscape → full viewport, 16:9 letterbox centered
══════════════════════════════════════════ */
.app {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--bg);
}

/* PORTRAIT: fill full screen */
@media (orientation: portrait) {
  .app { width: 100vw; height: 100dvh; }
}

/* LANDSCAPE / DESKTOP: 16:9 box, vertically + horizontally centred */
@media (orientation: landscape) {
  body { justify-content: center; align-items: center; }
  .app {
    width: min(100vw, calc(100dvh * 16/9));
    height: min(100dvh, calc(100vw * 9/16));
    border-radius: 4px;
    box-shadow: 0 0 80px rgba(0,0,0,0.9);
  }
}

/* ══════════════════════════════════════════
   SCREENS — full‑height panels inside .app
══════════════════════════════════════════ */
.screen {
  display: none;
  flex-direction: column;
  width: 100%; height: 100%;
  position: absolute; inset: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.screen.active { display: flex; }

/* ══════════════════════════════════════════
   LANDSCAPE: two-column layout helpers
══════════════════════════════════════════ */
@media (orientation: landscape) {
  /* Home — sidebar + main */
  #home-screen { flex-direction: row; }
  .home-sidebar {
    width: 40%;
    display: flex; flex-direction: column;
    padding: var(--s3);
    background: linear-gradient(160deg, #1a1040 0%, var(--bg) 100%);
    border-right: 1px solid var(--border);
    justify-content: center;
  }
  .home-main {
    flex: 1;
    display: flex; flex-direction: column;
    padding: var(--s3);
    overflow-y: auto;
    justify-content: center; gap: var(--s2);
  }

  /* Manage — sidebar list + content */
  #manage-screen { flex-direction: column; }

  /* Session — split */
  #session-screen { flex-direction: row; align-items: stretch; }
  .session-left {
    width: 45%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: var(--s3);
    background: linear-gradient(160deg, #1a1040 0%, var(--bg) 100%);
    border-right: 1px solid var(--border);
  }
  .session-right {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: var(--s3); gap: var(--s2);
  }
}

@media (orientation: portrait) {
  .home-sidebar { display: contents; }
  .home-main { display: contents; }
  .session-left { display: contents; }
  .session-right { display: contents; }
}

/* ══════════════════════════════════════════
   LOGIN
══════════════════════════════════════════ */
#login-screen {
  align-items: center; justify-content: center;
  gap: var(--s2);
  background: radial-gradient(ellipse at 50% 30%, #2d1f6e 0%, var(--bg) 70%);
  padding: var(--s4);
}
.login-logo { font-size: clamp(48px, 8vw, 80px); animation: float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.login-title {
  font-size: var(--fs-xl); font-weight: 900;
  line-height: 1; letter-spacing: -2px; text-align: center;
}
.login-title span { color: var(--accent2); }
.login-sub { color: var(--muted); font-size: var(--fs-sm); text-align: center; }
.google-btn {
  display: flex; align-items: center; gap: var(--s2);
  background: white; color: #1a1a2e; border: none;
  border-radius: var(--radius-md);
  padding: clamp(12px,2vh,18px) clamp(20px,3vw,32px);
  font-size: var(--fs-md); font-weight: 700; cursor: pointer;
  font-family: 'Syne', sans-serif;
  box-shadow: 0 0 40px rgba(124,111,247,0.3);
  transition: transform 0.15s; width: 100%; max-width: 320px; justify-content: center;
  margin-top: var(--s2);
}
.google-btn:active { transform: scale(0.97); }
.google-icon { width: clamp(20px,3vw,28px); height: clamp(20px,3vw,28px); flex-shrink: 0; }

/* ══════════════════════════════════════════
   HOME
══════════════════════════════════════════ */
.home-header { padding: var(--s3) var(--s3) var(--s2); }
.greeting { font-size: var(--fs-xs); color: var(--muted); font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
.home-title { font-size: var(--fs-xl); font-weight: 900; letter-spacing: -1px; margin-top: 4px; line-height: 1.1; }
.home-title span { color: var(--accent2); }

.stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: var(--s1); padding: 0 var(--s3) var(--s2); }
.stat-card { background: var(--card); border-radius: var(--radius-sm); padding: var(--s2) var(--s1); text-align: center; border: 1px solid var(--border); }
.stat-val { font-size: var(--fs-lg); font-weight: 900; }
.stat-lbl { font-size: var(--fs-xs); color: var(--muted); margin-top: 2px; line-height: 1.2; }

.home-btns { padding: 0 var(--s3); display: flex; flex-direction: column; gap: var(--s2); }
@media (orientation: landscape) {
  .home-btns { flex-direction: row; }
}

.main-btn {
  display: flex; align-items: center; gap: var(--s2);
  background: linear-gradient(135deg, #5b4fd4, #8b5cf6);
  border: none; border-radius: var(--radius-md);
  padding: var(--s2) var(--s3); cursor: pointer;
  width: 100%; text-align: left;
  box-shadow: 0 6px 28px rgba(124,111,247,0.35);
  transition: transform 0.15s; font-family: 'Syne', sans-serif;
}
.main-btn:active { transform: scale(0.98); }
.main-btn.secondary { background: var(--card); border: 1px solid var(--border); box-shadow: none; }
.main-btn-icon { font-size: clamp(22px,3.5vw,36px); flex-shrink: 0; }
.main-btn-title { color: white; font-weight: 800; font-size: var(--fs-md); }
.main-btn-sub { color: rgba(255,255,255,0.6); font-size: var(--fs-xs); margin-top: 2px; }

.section-title { font-size: var(--fs-xs); font-weight: 700; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; padding: var(--s2) var(--s3) var(--s1); }
.word-pills { display: flex; flex-wrap: wrap; gap: var(--s1); padding: 0 var(--s3) var(--s3); }
.word-pill { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 6px var(--s2); display: flex; flex-direction: column; gap: 3px; }
.pill-en { font-size: var(--fs-sm); font-weight: 700; color: var(--accent2); }
.pill-dots { display: flex; gap: 3px; }
.dot { width: clamp(6px,1vw,9px); height: clamp(6px,1vw,9px); border-radius: 50%; background: var(--border); }
.dot.on { background: var(--green); }

/* ══════════════════════════════════════════
   TOPBAR
══════════════════════════════════════════ */
.topbar { display: flex; align-items: center; justify-content: space-between; padding: var(--s2) var(--s3); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.topbar-title { font-size: var(--fs-md); font-weight: 800; }
.back-btn { background: none; border: none; color: var(--accent2); font-size: var(--fs-sm); font-weight: 700; cursor: pointer; font-family: 'Syne', sans-serif; padding: 4px 8px; }

/* ══════════════════════════════════════════
   MANAGE
══════════════════════════════════════════ */
.tabs { display: flex; gap: var(--s1); padding: var(--s2) var(--s3); flex-shrink: 0; }
.tab { flex: 1; padding: clamp(7px,1.2vh,11px) 4px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--card); color: var(--muted); font-size: var(--fs-xs); font-weight: 700; cursor: pointer; font-family: 'Syne', sans-serif; transition: all 0.15s; }
.tab.active { background: var(--accent); color: white; border-color: var(--accent); }

.tab-content { display: none; padding: 0 var(--s3) 80px; flex-direction: column; gap: var(--s2); overflow-y: auto; flex: 1; }
.tab-content.active { display: flex; }

.label { font-size: var(--fs-xs); font-weight: 700; color: var(--muted); }
input[type=text], textarea {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  padding: clamp(10px,1.5vh,14px) var(--s2); font-size: var(--fs-sm); outline: none;
  font-family: 'Syne', sans-serif; width: 100%; transition: border-color 0.2s;
}
input[type=text]:focus, textarea:focus { border-color: var(--accent); }
textarea { resize: vertical; font-size: var(--fs-xs); font-family: monospace; }
.add-btn { background: linear-gradient(135deg, #5b4fd4, #8b5cf6); border: none; border-radius: var(--radius-sm); color: white; padding: clamp(10px,1.5vh,14px); font-size: var(--fs-sm); font-weight: 700; cursor: pointer; font-family: 'Syne', sans-serif; }
.divider { height: 1px; background: var(--border); }
.preset-item { display: flex; align-items: center; justify-content: space-between; background: var(--card); border-radius: var(--radius-sm); padding: var(--s2) var(--s3); border: 1px solid var(--border); }
.preset-name { font-weight: 700; font-size: var(--fs-sm); }
.preset-count { font-size: var(--fs-xs); color: var(--muted); margin-top: 2px; }
.preset-btn { background: var(--accent); border: none; border-radius: var(--radius-sm); color: white; padding: 8px var(--s2); font-weight: 700; font-size: var(--fs-xs); cursor: pointer; font-family: 'Syne', sans-serif; }
.word-list { display: flex; flex-direction: column; }
.word-row { display: flex; align-items: center; justify-content: space-between; padding: var(--s2) 0; border-bottom: 1px solid var(--border); }
.word-row-left { display: flex; flex-direction: column; gap: 2px; }
.word-en { font-weight: 700; font-size: var(--fs-sm); color: var(--accent2); }
.word-zh { font-size: var(--fs-xs); color: var(--muted); }
.word-row-right { display: flex; align-items: center; gap: var(--s2); }
.del-btn { background: none; border: none; color: var(--red); font-size: var(--fs-lg); cursor: pointer; padding: 4px 8px; }
.empty { color: var(--muted); text-align: center; padding: 40px 0; font-size: var(--fs-sm); }

/* ══════════════════════════════════════════
   SESSION
══════════════════════════════════════════ */
.session-topbar { display: flex; align-items: center; gap: var(--s2); padding: var(--s2) var(--s3); flex-shrink: 0; }
.progress-track { flex: 1; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 3px; transition: width 0.4s ease; }
.progress-text { font-size: var(--fs-xs); color: var(--muted); font-weight: 700; white-space: nowrap; }

.question-area {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: var(--s3); gap: var(--s2);
}

.review-badge { background: #3d2a06; color: var(--yellow); font-size: var(--fs-xs); font-weight: 700; padding: 4px var(--s2); border-radius: 20px; border: 1px solid #78350f; }
.streak-display { display: flex; gap: var(--s1); }
.streak-dot { width: clamp(10px,1.8vw,16px); height: clamp(10px,1.8vw,16px); border-radius: 50%; background: var(--bg3); border: 1px solid var(--border); transition: all 0.3s; }
.streak-dot.on { background: var(--green); border-color: #059669; box-shadow: 0 0 8px rgba(52,211,153,0.5); }

.chinese-word {
  font-size: var(--fs-2xl); font-weight: 900; text-align: center;
  color: var(--text); line-height: 1.1;
  text-shadow: 0 0 60px rgba(167,139,250,0.3);
  font-family: 'Noto Sans SC', sans-serif;
}
.question-hint { font-size: var(--fs-sm); color: var(--muted); }
.letter-hint { font-size: var(--fs-sm); color: var(--accent); font-weight: 700; }

.answer-input {
  width: 100%; max-width: clamp(260px, 50vw, 380px);
  background: var(--card); border: 2px solid var(--border);
  border-radius: var(--radius-lg); color: var(--text);
  padding: clamp(14px,2.5vh,20px) var(--s3);
  font-size: var(--fs-lg); font-weight: 700; text-align: center; outline: none;
  font-family: 'Syne', sans-serif; transition: border-color 0.2s, background 0.2s;
}
.answer-input:focus { border-color: var(--accent); }
.answer-input.correct { border-color: var(--green); background: #052e16; }
.answer-input.wrong { border-color: var(--red); background: #2d0707; }

.correct-ans { font-size: var(--fs-md); color: var(--yellow); font-weight: 700; background: #1c1407; border-radius: var(--radius-sm); padding: var(--s1) var(--s3); border: 1px solid #78350f; text-align: center; }
.session-btns { display: flex; gap: var(--s1); width: 100%; max-width: clamp(260px, 50vw, 380px); }
.speak-btn { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--muted); padding: var(--s2); font-size: var(--fs-sm); font-weight: 700; cursor: pointer; font-family: 'Syne', sans-serif; }
.submit-btn { flex: 2; background: linear-gradient(135deg, #5b4fd4, #8b5cf6); border: none; border-radius: var(--radius-sm); color: white; padding: var(--s2); font-size: var(--fs-md); font-weight: 800; cursor: pointer; font-family: 'Syne', sans-serif; transition: opacity 0.2s; }
.submit-btn:disabled { opacity: 0.4; }

.feedback-banner { width: 100%; max-width: clamp(260px,50vw,380px); text-align: center; border-radius: var(--radius-sm); padding: var(--s2); font-weight: 800; font-size: var(--fs-lg); animation: pop 0.2s ease; }
@keyframes pop { 0%{transform:scale(0.9)} 100%{transform:scale(1)} }
.feedback-banner.correct { background: #052e16; color: var(--green); }
.feedback-banner.wrong { background: #2d0707; color: var(--red); }

/* ══════════════════════════════════════════
   RESULT
══════════════════════════════════════════ */
.result-header { padding: var(--s4) var(--s3) var(--s3); text-align: center; background: linear-gradient(180deg, #1a1040 0%, transparent 100%); display: flex; flex-direction: column; align-items: center; gap: var(--s2); flex-shrink: 0; }
.score-ring { width: clamp(100px,18vw,140px); height: clamp(100px,18vw,140px); border-radius: 50%; background: conic-gradient(var(--accent) var(--pct,0%), var(--bg3) 0); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 40px rgba(124,111,247,0.4); position: relative; }
.score-ring::before { content: ''; position: absolute; width: 75%; height: 75%; border-radius: 50%; background: var(--bg); }
.score-inner { position: relative; text-align: center; }
.score-pct { display: block; font-size: var(--fs-lg); font-weight: 900; }
.score-frac { display: block; font-size: var(--fs-xs); color: var(--muted); }
.result-title { font-size: var(--fs-xl); font-weight: 900; }
.result-sub { font-size: var(--fs-sm); color: var(--muted); }
.wrong-section { padding: 0 var(--s3); overflow-y: auto; flex: 1; }
.wrong-row { display: flex; align-items: center; gap: var(--s2); background: var(--card); border-radius: var(--radius-sm); padding: var(--s2) var(--s3); margin-bottom: var(--s1); border: 1px solid var(--border); }
.wrong-zh { font-size: var(--fs-md); flex: 1; font-family: 'Noto Sans SC', sans-serif; }
.wrong-en { font-size: var(--fs-sm); color: var(--accent2); font-weight: 700; }
.result-btns { padding: var(--s3); display: flex; gap: var(--s2); flex-shrink: 0; }
@media (orientation: portrait) { .result-btns { flex-direction: column; } }

/* landscape result — side by side */
@media (orientation: landscape) {
  #result-screen { flex-direction: row; }
  .result-header { width: 40%; justify-content: center; border-right: 1px solid var(--border); }
  .result-body { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .wrong-section { padding: var(--s2) var(--s3); }
  .result-btns { padding: var(--s2) var(--s3); }
}
@media (orientation: portrait) {
  .result-body { display: contents; }
}

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
.toast { position: fixed; top: max(16px, 2vh); left: 50%; transform: translateX(-50%); padding: clamp(8px,1.5vh,12px) clamp(16px,3vw,24px); border-radius: var(--radius-sm); color: white; font-weight: 700; font-size: var(--fs-sm); z-index: 999; box-shadow: 0 4px 20px rgba(0,0,0,0.5); white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.3s; }
.toast.show { opacity: 1; }

/* ══════════════════════════════════════════
   LOADING
══════════════════════════════════════════ */
#loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; transition: opacity 0.5s; }
.spinner { width: clamp(36px,6vw,52px); height: clamp(36px,6vw,52px); border-radius: 50%; border: 3px solid var(--border); border-top-color: var(--accent); animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#loading-overlay p { color: var(--muted); margin-top: var(--s2); font-size: var(--fs-sm); }
</style>
</head>
<body>
<div class="app">

  <div id="loading-overlay"><div class="spinner"></div><p>载入中...</p></div>
  <div class="toast" id="toast"></div>

  <!-- LOGIN -->
  <div class="screen" id="login-screen">
    <div class="login-logo">✏️</div>
    <div class="login-title">Spelling<br><span>Master</span></div>
    <p class="login-sub">登录后词库跨设备同步</p>
    <button class="google-btn" onclick="signInGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      用 Google 账号登录
    </button>
  </div>

  <!-- HOME -->
  <div class="screen" id="home-screen">
    <div class="home-sidebar">
      <div class="home-header">
        <div class="greeting">欢迎回来</div>
        <div class="home-title" id="home-username">Spelling <span>Master</span></div>
      </div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-val" id="stat-total">0</div><div class="stat-lbl">词库总数</div></div>
        <div class="stat-card"><div class="stat-val" style="color:var(--green)" id="stat-mastered">0</div><div class="stat-lbl">已掌握</div></div>
        <div class="stat-card"><div class="stat-val" style="color:var(--yellow)" id="stat-review">0</div><div class="stat-lbl">需复习</div></div>
        <div class="stat-card"><div class="stat-val" style="color:var(--muted)" id="stat-new">0</div><div class="stat-lbl">未练习</div></div>
      </div>
      <div class="section-title">需要加强的词</div>
      <div class="word-pills" id="struggling-pills"></div>
    </div>
    <div class="home-main">
      <div class="home-btns">
        <button class="main-btn" onclick="startSession()">
          <span class="main-btn-icon">🎯</span>
          <div><div class="main-btn-title">开始 Spelling</div><div class="main-btn-sub" id="session-sub">每轮 20 题</div></div>
        </button>
        <button class="main-btn secondary" onclick="showScreen('manage-screen')">
          <span class="main-btn-icon">📚</span>
          <div><div class="main-btn-title" style="color:var(--text)">管理词库</div><div class="main-btn-sub">添加 / 查看词语</div></div>
        </button>
      </div>
    </div>
  </div>

  <!-- MANAGE -->
  <div class="screen" id="manage-screen">
    <div class="topbar">
      <button class="back-btn" onclick="showScreen('home-screen')">← 返回</button>
      <div class="topbar-title">词库管理</div>
      <div style="width:60px"></div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('add')">➕ 手动</button>
      <button class="tab" onclick="switchTab('preset')">📦 预设</button>
      <button class="tab" id="list-tab-btn" onclick="switchTab('list')">📋 词库</button>
    </div>
    <div class="tab-content active" id="tab-add">
      <div class="label">逐个添加</div>
      <input type="text" id="input-en" placeholder="英文 (e.g. beautiful)">
      <input type="text" id="input-zh" placeholder="华文意思 (e.g. 美丽的)">
      <button class="add-btn" onclick="addWord()">添加词语</button>
      <div class="divider"></div>
      <div class="label">批量添加 <span style="font-weight:400;color:var(--muted)">（每行：英文, 华文）</span></div>
      <textarea id="bulk-input" rows="5" placeholder="beautiful, 美丽的&#10;careful, 小心的&#10;adventure, 冒险"></textarea>
      <button class="add-btn" onclick="bulkAdd()">批量添加</button>
    </div>
    <div class="tab-content" id="tab-preset">
      <div class="preset-item">
        <div><div class="preset-name">小学基础词 (P1-P3)</div><div class="preset-count">30 个词</div></div>
        <button class="preset-btn" onclick="addPreset('p1')">添加</button>
      </div>
      <div class="preset-item">
        <div><div class="preset-name">小学进阶词 (P4-P6)</div><div class="preset-count">30 个词</div></div>
        <button class="preset-btn" onclick="addPreset('p4')">添加</button>
      </div>
      <div class="preset-item">
        <div><div class="preset-name">中学词汇 (F1-F3)</div><div class="preset-count">30 个词</div></div>
        <button class="preset-btn" onclick="addPreset('f1')">添加</button>
      </div>
    </div>
    <div class="tab-content" id="tab-list">
      <div class="word-list" id="word-list-container"></div>
    </div>
  </div>

  <!-- SESSION -->
  <div class="screen" id="session-screen">
    <div class="session-left">
      <div class="session-topbar" style="width:100%;padding-left:0;padding-right:0;">
        <button class="back-btn" onclick="exitSession()">✕</button>
        <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
        <div class="progress-text" id="progress-text">1/20</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:var(--s2);flex:1;justify-content:center;width:100%;">
        <div class="review-badge" id="review-badge" style="display:none">🔁 复习中</div>
        <div class="streak-display">
          <div class="streak-dot" id="dot0"></div>
          <div class="streak-dot" id="dot1"></div>
          <div class="streak-dot" id="dot2"></div>
        </div>
        <div class="chinese-word" id="chinese-word">-</div>
        <p class="question-hint">请拼出英文单词</p>
        <div class="letter-hint" id="letter-hint"></div>
      </div>
    </div>
    <div class="session-right">
      <input class="answer-input" type="text" id="answer-input" placeholder="在这里输入..."
        autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
      <div class="correct-ans" id="correct-ans" style="display:none"></div>
      <div class="session-btns">
        <button class="speak-btn" onclick="speakWord()">🔊 发音</button>
        <button class="submit-btn" id="submit-btn" onclick="submitAnswer()">确认 ✓</button>
      </div>
      <div class="feedback-banner" id="feedback-banner" style="display:none"></div>
    </div>
  </div>

  <!-- RESULT -->
  <div class="screen" id="result-screen">
    <div class="result-header">
      <div class="score-ring" id="score-ring">
        <div class="score-inner">
          <span class="score-pct" id="score-pct">0%</span>
          <span class="score-frac" id="score-frac">0/0</span>
        </div>
      </div>
      <div class="result-title" id="result-title">完成！</div>
      <div class="result-sub">本轮 Spelling 已完成</div>
    </div>
    <div class="result-body">
      <div class="section-title" id="wrong-label">答错的词（将重点复习）</div>
      <div class="wrong-section" id="wrong-section"></div>
      <div class="result-btns">
        <button class="main-btn" onclick="startSession()">
          <span class="main-btn-icon">🔄</span>
          <div><div class="main-btn-title">再来一轮</div><div class="main-btn-sub">包含旧词复习</div></div>
        </button>
        <button class="main-btn secondary" onclick="showScreen('home-screen')">
          <span class="main-btn-icon">🏠</span>
          <div><div class="main-btn-title" style="color:var(--text)">回到主页</div><div class="main-btn-sub">稍后再练</div></div>
        </button>
      </div>
    </div>
  </div>

</div><!-- .app -->

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc }
  from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBGnPiTkcaNvXU7JiI6oGuNwHLcm2oo0vY",
  authDomain: "spelling-app-66d6a.firebaseapp.com",
  projectId: "spelling-app-66d6a",
  storageBucket: "spelling-app-66d6a.firebasestorage.app",
  messagingSenderId: "209760445368",
  appId: "1:209760445368:web:0aa6391565a9660f20e54d"
};

const fireApp = initializeApp(firebaseConfig);
const auth = getAuth(fireApp);
const db = getFirestore(fireApp);

const PRESETS = {
  p1:[{en:"apple",zh:"苹果"},{en:"bird",zh:"鸟"},{en:"cat",zh:"猫"},{en:"dog",zh:"狗"},{en:"egg",zh:"蛋"},{en:"fish",zh:"鱼"},{en:"girl",zh:"女孩"},{en:"hat",zh:"帽子"},{en:"jump",zh:"跳"},{en:"kite",zh:"风筝"},{en:"lamp",zh:"灯"},{en:"milk",zh:"牛奶"},{en:"nest",zh:"鸟巢"},{en:"open",zh:"打开"},{en:"park",zh:"公园"},{en:"rain",zh:"雨"},{en:"sun",zh:"太阳"},{en:"tree",zh:"树"},{en:"umbrella",zh:"雨伞"},{en:"van",zh:"货车"},{en:"water",zh:"水"},{en:"box",zh:"箱子"},{en:"yellow",zh:"黄色"},{en:"zoo",zh:"动物园"},{en:"book",zh:"书"},{en:"cake",zh:"蛋糕"},{en:"door",zh:"门"},{en:"farm",zh:"农场"},{en:"gate",zh:"大门"},{en:"hand",zh:"手"}],
  p4:[{en:"adventure",zh:"冒险"},{en:"beautiful",zh:"美丽的"},{en:"careful",zh:"小心的"},{en:"dangerous",zh:"危险的"},{en:"excellent",zh:"优秀的"},{en:"friendly",zh:"友善的"},{en:"grateful",zh:"感激的"},{en:"horrible",zh:"可怕的"},{en:"important",zh:"重要的"},{en:"jealous",zh:"嫉妒的"},{en:"knowledge",zh:"知识"},{en:"laughter",zh:"笑声"},{en:"mountain",zh:"山"},{en:"necessary",zh:"必要的"},{en:"ordinary",zh:"普通的"},{en:"peaceful",zh:"和平的"},{en:"question",zh:"问题"},{en:"remember",zh:"记得"},{en:"surprise",zh:"惊喜"},{en:"together",zh:"一起"},{en:"vacation",zh:"假期"},{en:"wonderful",zh:"精彩的"},{en:"excited",zh:"兴奋的"},{en:"achieve",zh:"达成"},{en:"between",zh:"之间"},{en:"century",zh:"世纪"},{en:"discuss",zh:"讨论"},{en:"energy",zh:"能量"},{en:"forest",zh:"森林"},{en:"gentle",zh:"温和的"}],
  f1:[{en:"accomplish",zh:"完成/实现"},{en:"benefit",zh:"利益/好处"},{en:"character",zh:"性格/特点"},{en:"describe",zh:"描述"},{en:"environment",zh:"环境"},{en:"fortunate",zh:"幸运的"},{en:"government",zh:"政府"},{en:"however",zh:"然而"},{en:"influence",zh:"影响"},{en:"journey",zh:"旅程"},{en:"language",zh:"语言"},{en:"material",zh:"材料/物质"},{en:"natural",zh:"自然的"},{en:"opportunity",zh:"机会"},{en:"participate",zh:"参与"},{en:"quality",zh:"品质/质量"},{en:"responsible",zh:"负责任的"},{en:"solution",zh:"解决方案"},{en:"tradition",zh:"传统"},{en:"understand",zh:"理解"},{en:"various",zh:"各种各样的"},{en:"wisdom",zh:"智慧"},{en:"experience",zh:"经验/经历"},{en:"appreciate",zh:"欣赏/感激"},{en:"brilliant",zh:"才华横溢的"},{en:"challenge",zh:"挑战"},{en:"develop",zh:"发展/开发"},{en:"encourage",zh:"鼓励"},{en:"failure",zh:"失败"},{en:"generate",zh:"产生/生成"}],
};

let currentUser=null,wordBank=[],sessionWords=[],currentIdx=0,sessionResults=[],feedbackActive=false;

window.showScreen = function(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='home-screen') refreshHome();
  if(id==='manage-screen') refreshWordList();
};

function toast(msg,color='#7c6ff7'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.background=color;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function speak(text){
  if('speechSynthesis'in window){
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='en-US';u.rate=0.85;speechSynthesis.speak(u);
  }
}

async function loadWordBank(){
  try{const snap=await getDoc(doc(db,'users',currentUser.uid,'data','wordbank'));wordBank=snap.exists()?(snap.data().words||[]):[];}
  catch(e){wordBank=[];}
  refreshHome();
}

async function saveWordBank(){
  if(!currentUser)return;
  try{await setDoc(doc(db,'users',currentUser.uid,'data','wordbank'),{words:wordBank,updatedAt:new Date().toISOString()});}
  catch(e){toast('保存失败，请检查网络','#f87171');}
}

window.signInGoogle=async function(){
  try{await signInWithPopup(auth,new GoogleAuthProvider());}
  catch(e){toast('登录失败：'+e.message,'#f87171');}
};

onAuthStateChanged(auth,async(user)=>{
  const ov=document.getElementById('loading-overlay');
  ov.style.opacity='0';setTimeout(()=>ov.style.display='none',500);
  if(user){
    currentUser=user;
    await loadWordBank();
    window.showScreen('home-screen');
    const name=user.displayName?user.displayName.split(' ')[0]:'同学';
    document.getElementById('home-username').innerHTML=`${name} <span>👋</span>`;
  }else{currentUser=null;window.showScreen('login-screen');}
});

function refreshHome(){
  const mastered=wordBank.filter(w=>(w.streak||0)>=3).length;
  const struggling=wordBank.filter(w=>w.totalAttempts>0&&(w.streak||0)<3).length;
  const fresh=wordBank.filter(w=>!w.totalAttempts).length;
  document.getElementById('stat-total').textContent=wordBank.length;
  document.getElementById('stat-mastered').textContent=mastered;
  document.getElementById('stat-review').textContent=struggling;
  document.getElementById('stat-new').textContent=fresh;
  document.getElementById('session-sub').textContent=`每轮 ${Math.min(wordBank.length,20)} 题`;
  const pills=document.getElementById('struggling-pills');
  pills.innerHTML='';
  wordBank.filter(w=>w.totalAttempts>0&&(w.streak||0)<3).slice(0,8).forEach(w=>{
    const s=w.streak||0;
    pills.innerHTML+=`<div class="word-pill"><span class="pill-en">${w.en}</span><div class="pill-dots"><div class="dot${s>0?' on':''}"></div><div class="dot${s>1?' on':''}"></div><div class="dot${s>2?' on':''}"></div></div></div>`;
  });
}

window.switchTab=function(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['add','preset','list'][i]===tab));
  document.querySelectorAll('.tab-content').forEach(tc=>tc.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='list')refreshWordList();
};

function refreshWordList(){
  document.getElementById('list-tab-btn').textContent=`📋 词库(${wordBank.length})`;
  const c=document.getElementById('word-list-container');
  if(!wordBank.length){c.innerHTML='<div class="empty">词库是空的，请先添加词语</div>';return;}
  c.innerHTML=wordBank.map(w=>{const s=w.streak||0;return`<div class="word-row"><div class="word-row-left"><span class="word-en">${w.en}</span><span class="word-zh">${w.zh}</span></div><div class="word-row-right"><div style="display:flex;gap:4px"><div class="dot${s>0?' on':''}"></div><div class="dot${s>1?' on':''}"></div><div class="dot${s>2?' on':''}"></div></div><button class="del-btn" onclick="deleteWord('${w.en}')">✕</button></div></div>`;}).join('');
}

window.addWord=async function(){
  const en=document.getElementById('input-en').value.trim().toLowerCase();
  const zh=document.getElementById('input-zh').value.trim();
  if(!en||!zh){toast('请填写英文和华文！','#f87171');return;}
  if(wordBank.some(w=>w.en===en)){toast('这个词已经存在了！','#f87171');return;}
  wordBank.push({en,zh,streak:0,totalAttempts:0,totalCorrect:0,addedOn:new Date().toISOString()});
  await saveWordBank();
  document.getElementById('input-en').value='';
  document.getElementById('input-zh').value='';
  toast('✅ 词语已添加！','#34d399');
  refreshHome();
};

window.bulkAdd=async function(){
  const lines=document.getElementById('bulk-input').value.split('\n').map(l=>l.trim()).filter(Boolean);
  let added=0,skipped=0;
  for(const line of lines){
    const parts=line.split(/[,，\t]+/);
    if(parts.length<2){skipped++;continue;}
    const en=parts[0].trim().toLowerCase(),zh=parts[1].trim();
    if(!en||!zh||wordBank.some(w=>w.en===en)){skipped++;continue;}
    wordBank.push({en,zh,streak:0,totalAttempts:0,totalCorrect:0,addedOn:new Date().toISOString()});
    added++;
  }
  if(added){await saveWordBank();document.getElementById('bulk-input').value='';}
  toast(`✅ 添加了 ${added} 个词${skipped?`，跳过 ${skipped} 个`:''}`,added?'#34d399':'#f87171');
  refreshHome();
};

window.addPreset=async function(key){
  let added=0;
  for(const w of PRESETS[key]){
    if(!wordBank.some(x=>x.en===w.en)){wordBank.push({...w,streak:0,totalAttempts:0,totalCorrect:0,addedOn:new Date().toISOString()});added++;}
  }
  if(added)await saveWordBank();
  toast(`✅ 已添加 ${added} 个词！`,'#34d399');
  refreshHome();
};

window.deleteWord=async function(en){
  wordBank=wordBank.filter(w=>w.en!==en);
  await saveWordBank();refreshWordList();toast('已删除','#6b6b8a');
};

function buildSession(){
  if(!wordBank.length)return[];
  const struggling=wordBank.filter(w=>w.totalAttempts>0&&(w.streak||0)<3);
  const fresh=wordBank.filter(w=>!w.totalAttempts);
  const mastered=wordBank.filter(w=>(w.streak||0)>=3);
  let pool=[...struggling,...struggling,...fresh];
  mastered.forEach(w=>{if(Math.random()<0.3)pool.push(w);});
  pool=pool.sort(()=>Math.random()-0.5);
  const seen=new Set(),result=[];
  for(const w of pool){if(!seen.has(w.en)){seen.add(w.en);result.push({...w});}if(result.length>=20)break;}
  for(const w of wordBank){if(!seen.has(w.en)){seen.add(w.en);result.push({...w});}if(result.length>=20)break;}
  return result.slice(0,20);
}

window.startSession=function(){
  if(!wordBank.length){toast('请先添加词语！','#f87171');return;}
  sessionWords=buildSession();currentIdx=0;sessionResults=[];
  window.showScreen('session-screen');showQuestion();
};

function showQuestion(){
  const w=sessionWords[currentIdx];
  feedbackActive=false;
  document.getElementById('feedback-banner').style.display='none';
  document.getElementById('correct-ans').style.display='none';
  const ai=document.getElementById('answer-input');
  ai.value='';ai.className='answer-input';ai.disabled=false;
  document.getElementById('submit-btn').disabled=false;
  document.getElementById('progress-fill').style.width=(currentIdx/sessionWords.length*100)+'%';
  document.getElementById('progress-text').textContent=`${currentIdx+1}/${sessionWords.length}`;
  document.getElementById('chinese-word').textContent=w.zh;
  document.getElementById('letter-hint').textContent=`共 ${w.en.length} 个字母`;
  const isReview=w.totalAttempts>0&&(w.streak||0)<3;
  document.getElementById('review-badge').style.display=isReview?'block':'none';
  const s=w.streak||0;
  for(let i=0;i<3;i++)document.getElementById('dot'+i).className='streak-dot'+(i<s?' on':'');
  setTimeout(()=>ai.focus(),100);
}

window.speakWord=function(){const w=sessionWords[currentIdx];if(w)speak(w.en);};

window.submitAnswer=function(){
  if(feedbackActive)return;
  const w=sessionWords[currentIdx];
  const input=document.getElementById('answer-input').value.trim().toLowerCase();
  if(!input)return;
  feedbackActive=true;
  document.getElementById('answer-input').disabled=true;
  document.getElementById('submit-btn').disabled=true;
  const correct=input===w.en.toLowerCase();
  document.getElementById('answer-input').className='answer-input '+(correct?'correct':'wrong');
  const banner=document.getElementById('feedback-banner');
  banner.className='feedback-banner '+(correct?'correct':'wrong');
  banner.textContent=correct?'🎉 答对了！':'❌ 再接再厉！';
  banner.style.display='block';
  if(!correct){document.getElementById('correct-ans').textContent=`正确答案：${w.en}`;document.getElementById('correct-ans').style.display='block';}
  sessionResults.push({word:w,correct});
  const idx=wordBank.findIndex(x=>x.en===w.en);
  if(idx>=0){const wb=wordBank[idx];wordBank[idx]={...wb,streak:correct?(wb.streak||0)+1:0,totalAttempts:(wb.totalAttempts||0)+1,totalCorrect:(wb.totalCorrect||0)+(correct?1:0),lastSeen:new Date().toISOString()};}
  saveWordBank();
  setTimeout(()=>{const next=currentIdx+1;if(next>=sessionWords.length)showResult();else{currentIdx=next;showQuestion();}},correct?900:1800);
};

document.getElementById('answer-input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!feedbackActive)window.submitAnswer();});
window.exitSession=function(){if(confirm('确定要退出吗？'))window.showScreen('home-screen');};

function showResult(){
  const correct=sessionResults.filter(r=>r.correct).length;
  const total=sessionResults.length;
  const pct=Math.round(correct/total*100);
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('score-frac').textContent=`${correct}/${total}`;
  document.getElementById('score-ring').style.setProperty('--pct',pct+'%');
  document.getElementById('result-title').textContent=pct===100?'🏆 完美！':pct>=80?'🎉 非常棒！':pct>=60?'👍 继续加油！':'💪 继续练习！';
  const wrong=sessionResults.filter(r=>!r.correct);
  document.getElementById('wrong-label').style.display=wrong.length?'block':'none';
  document.getElementById('wrong-section').innerHTML=wrong.map(r=>`<div class="wrong-row"><span class="wrong-zh">${r.word.zh}</span><span class="wrong-en">${r.word.en}</span><div style="display:flex;gap:3px"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`).join('');
  window.showScreen('result-screen');
}
</script>
</body>
