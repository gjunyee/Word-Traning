<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Spelling Master</title>
<link rel="manifest" href="manifest.json">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #273549;
    --border: #334155;
    --text: #f8fafc;
    --text2: #94a3b8;
    --text3: #64748b;
    --accent: #6366f1;
    --accent2: #7c3aed;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
  }

  #app {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow-x: hidden;
  }

  /* ── SCREENS ── */
  .screen { display: none; flex-direction: column; flex: 1; }
  .screen.active { display: flex; }

  /* ── HOME ── */
  .home-header {
    background: linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%);
    padding: 48px 24px 28px;
    text-align: center;
  }
  .home-logo { font-size: 52px; margin-bottom: 10px; }
  .home-title { font-size: 38px; font-weight: 900; line-height: 1.1; letter-spacing: -1px; }
  .home-title span { color: #818cf8; }
  .home-sub { color: var(--text3); font-size: 14px; margin-top: 8px; }

  .stats-row { display: flex; gap: 10px; padding: 16px 16px 0; }
  .stat-card {
    flex: 1; background: var(--surface); border-radius: 12px;
    padding: 12px 6px; text-align: center;
  }
  .stat-value { font-size: 22px; font-weight: 900; }
  .stat-label { font-size: 10px; color: var(--text3); margin-top: 2px; line-height: 1.2; }

  .home-actions { padding: 16px 16px 0; display: flex; flex-direction: column; gap: 12px; }

  .big-btn {
    display: flex; align-items: center; gap: 16;
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    border: none; border-radius: 16px; padding: 18px 20px;
    cursor: pointer; text-align: left; width: 100%;
    box-shadow: 0 4px 20px rgba(99,102,241,0.4);
    gap: 16px;
  }
  .big-btn.secondary {
    background: var(--surface);
    box-shadow: none;
    border: 1px solid var(--border);
  }
  .big-btn-icon { font-size: 28px; }
  .big-btn-title { color: white; font-weight: 800; font-size: 17px; }
  .big-btn.secondary .big-btn-title { color: var(--text); }
  .big-btn-sub { color: var(--text2); font-size: 12px; margin-top: 2px; }

  .section-label {
    color: var(--text3); font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;
  }

  .recent-section { padding: 16px 16px 24px; }
  .word-pill-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .word-pill {
    background: var(--surface); border-radius: 20px; padding: 6px 12px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .pill-en { font-size: 13px; font-weight: 700; color: #818cf8; }
  .pill-streak { font-size: 9px; color: var(--text3); letter-spacing: 1px; }

  /* ── TOP BAR ── */
  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 16px 8px; border-bottom: 1px solid var(--surface);
  }
  .back-btn {
    background: none; border: none; color: #818cf8;
    font-size: 15px; font-weight: 700; cursor: pointer; padding: 4px 8px;
    font-family: 'Nunito', sans-serif;
  }
  .page-title { color: var(--text); font-size: 16px; font-weight: 800; }

  /* ── TABS ── */
  .tabs { display: flex; padding: 12px 16px; gap: 8px; }
  .tab {
    flex: 1; padding: 8px 4px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text3); font-size: 12px; font-weight: 700;
    cursor: pointer; font-family: 'Nunito', sans-serif;
  }
  .tab.active { background: var(--accent); color: white; border-color: var(--accent); }

  /* ── MANAGE ── */
  .card { padding: 0 16px 80px; display: flex; flex-direction: column; gap: 10px; }
  .card-label { color: var(--text2); font-size: 13px; font-weight: 700; margin-bottom: 4px; }
  .hint { font-weight: 400; color: var(--text3); }

  input[type=text], textarea {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    color: var(--text); padding: 12px 14px; font-size: 15px; outline: none;
    font-family: 'Nunito', sans-serif; width: 100%;
  }
  input[type=text]:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; }

  .add-btn {
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    border: none; border-radius: 12px; color: white;
    padding: 12px; font-size: 15px; font-weight: 700;
    cursor: pointer; font-family: 'Nunito', sans-serif;
  }
  .divider { height: 1px; background: var(--surface); margin: 8px 0; }

  .preset-item {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface); border-radius: 12px; padding: 14px 16px;
  }
  .preset-name { font-weight: 700; font-size: 14px; }
  .preset-count { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .preset-btn {
    background: var(--accent); border: none; border-radius: 8px;
    color: white; padding: 8px 16px; font-weight: 700; font-size: 13px;
    cursor: pointer; font-family: 'Nunito', sans-serif;
  }

  /* ── WORD LIST ── */
  .word-list { flex: 1; overflow-y: auto; padding: 0 16px 80px; }
  .word-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0; border-bottom: 1px solid var(--surface);
  }
  .word-en { font-weight: 700; font-size: 16px; color: #818cf8; }
  .word-zh { font-size: 13px; color: var(--text3); }
  .delete-btn {
    background: none; border: none; color: var(--red);
    font-size: 16px; cursor: pointer; padding: 4px 8px;
  }

  /* ── STREAK DOTS ── */
  .streak-dots { display: flex; gap: 4px; align-items: center; }
  .dot {
    width: 10px; height: 10px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--surface2);
    transition: background 0.3s;
  }
  .dot.filled { background: var(--green); border-color: #16a34a; }
  .dot.large { width: 14px; height: 14px; }

  /* ── SESSION ── */
  .session-header {
    display: flex; align-items: center; gap: 12; padding: 16px 16px 12px; gap: 12px;
  }
  .progress-wrap {
    flex: 1; height: 8px; background: var(--surface); border-radius: 4px; overflow: hidden;
  }
  .progress-bar {
    height: 100%; background: linear-gradient(90deg, #4f46e5, #7c3aed);
    border-radius: 4px; transition: width 0.4s ease;
  }
  .progress-text { font-size: 13px; color: var(--text3); font-weight: 700; white-space: nowrap; }

  .question-area {
    flex: 1; padding: 16px 24px 32px;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }
  .review-badge {
    background: #78350f; color: #fbbf24;
    font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 20px;
  }
  .chinese-word {
    font-size: 56px; font-weight: 900; text-align: center; line-height: 1.2;
    text-shadow: 0 0 40px rgba(129,140,248,0.4);
  }
  .question-hint { font-size: 14px; color: var(--text3); }
  .letter-count { font-size: 13px; color: #818cf8; font-weight: 600; }

  #answer-input {
    width: 100%; max-width: 320px;
    border: 2px solid var(--border); border-radius: 16px;
    font-size: 22px; font-weight: 700; text-align: center;
    transition: border-color 0.2s, background 0.2s;
  }
  #answer-input.correct { border-color: var(--green); background: #052e16; }
  #answer-input.wrong { border-color: var(--red); background: #2d0707; }

  .correct-answer {
    font-size: 16px; color: var(--amber); font-weight: 700;
    background: #1c1407; border-radius: 12px; padding: 10px 20px;
  }

  .session-btns { display: flex; gap: 12px; width: 100%; max-width: 320px; }
  .hint-btn {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text2); padding: 12px;
    font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Nunito', sans-serif;
  }
  .submit-btn {
    flex: 2; background: linear-gradient(135deg, #4f46e5, #7c3aed);
    border: none; border-radius: 12px; color: white;
    padding: 12px; font-size: 16px; font-weight: 800;
    cursor: pointer; font-family: 'Nunito', sans-serif;
    transition: opacity 0.2s;
  }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .feedback-banner {
    width: 100%; max-width: 320px; text-align: center;
    border-radius: 12px; padding: 12px; font-weight: 800; font-size: 18px;
  }
  .feedback-banner.correct { background: #052e16; color: var(--green); }
  .feedback-banner.wrong { background: #2d0707; color: var(--red); }

  /* ── RESULT ── */
  .result-header {
    padding: 40px 24px 24px;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    background: linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%);
  }
  .score-circle {
    width: 120px; height: 120px; border-radius: 50%;
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    box-shadow: 0 0 40px rgba(99,102,241,0.5);
  }
  .score-pct { font-size: 32px; font-weight: 900; color: white; }
  .score-label { font-size: 13px; color: #c7d2fe; }
  .result-title { font-size: 24px; font-weight: 900; }
  .result-sub { color: var(--text3); font-size: 14px; }

  .wrong-section { padding: 16px 16px 0; }
  .wrong-row {
    display: flex; align-items: center; gap: 12px;
    background: var(--surface); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px;
  }
  .wrong-zh { font-size: 16px; flex: 1; }
  .wrong-en { font-size: 16px; color: #818cf8; font-weight: 700; }

  .result-actions { padding: 16px; display: flex; flex-direction: column; gap: 12px; }

  /* ── TOAST ── */
  #toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    padding: 10px 20px; border-radius: 12px; color: white; font-weight: 700;
    font-size: 14px; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    white-space: nowrap; display: none; font-family: 'Nunito', sans-serif;
  }

  /* ── TRANSFER ── */
  .transfer-section { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .transfer-btn {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    color: var(--text); padding: 14px 16px; font-size: 15px; font-weight: 700;
    cursor: pointer; font-family: 'Nunito', sans-serif; text-align: left; display: flex;
    align-items: center; gap: 12px;
  }
  .transfer-btn:hover { border-color: var(--accent); }

  .empty { color: var(--text3); text-align: center; padding: 40px 0; }
</style>
</head>
<body>
<div id="app">
  <div id="toast"></div>

  <!-- HOME -->
  <div id="screen-home" class="screen active">
    <div class="home-header">
      <div class="home-logo">✏️</div>
      <h1 class="home-title">Spelling<br><span>Master</span></h1>
      <p class="home-sub">每天进步一点点</p>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-value" id="stat-total" style="color:#6366f1">0</div><div class="stat-label">词库总数</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-mastered" style="color:#22c55e">0</div><div class="stat-label">已掌握</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-struggling" style="color:#f59e0b">0</div><div class="stat-label">需复习</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-fresh" style="color:#94a3b8">0</div><div class="stat-label">未练习</div></div>
    </div>
    <div class="home-actions">
      <button class="big-btn" onclick="startSession()">
        <span class="big-btn-icon">🎯</span>
        <div><div class="big-btn-title">开始 Spelling</div><div class="big-btn-sub" id="session-sub">每轮 20 题</div></div>
      </button>
      <button class="big-btn secondary" onclick="showScreen('manage')">
        <span class="big-btn-icon">📚</span>
        <div><div class="big-btn-title">管理词库</div><div class="big-btn-sub">添加 / 查看词语</div></div>
      </button>
      <button class="big-btn secondary" onclick="showScreen('transfer')">
        <span class="big-btn-icon">📤</span>
        <div><div class="big-btn-title">资料转移</div><div class="big-btn-sub">导出 / 导入词库</div></div>
      </button>
    </div>
    <div class="recent-section">
      <div class="section-label">📌 需要加强的词</div>
      <div class="word-pill-row" id="struggling-pills"></div>
    </div>
  </div>

  <!-- MANAGE -->
  <div id="screen-manage" class="screen">
    <div class="top-bar">
      <button class="back-btn" onclick="showScreen('home')">← 返回</button>
      <div class="page-title">词库管理</div>
      <div style="width:60px"></div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('add',this)">➕ 手动</button>
      <button class="tab" onclick="switchTab('preset',this)">📦 预设</button>
      <button class="tab" onclick="switchTab('list',this)" id="list-tab-btn">📋 词库</button>
    </div>
    <div id="tab-add" class="card">
      <div class="card-label">逐个添加</div>
      <input type="text" id="input-en" placeholder="英文 (e.g. beautiful)">
      <input type="text" id="input-zh" placeholder="华文意思 (e.g. 美丽的)">
      <button class="add-btn" onclick="addWord()">添加词语</button>
      <div class="divider"></div>
      <div class="card-label">批量添加 <span class="hint">（每行：英文, 华文）</span></div>
      <textarea id="bulk-input" rows="6" placeholder="beautiful, 美丽的&#10;careful, 小心的&#10;adventure, 冒险"></textarea>
      <button class="add-btn" onclick="bulkAdd()">批量添加</button>
    </div>
    <div id="tab-preset" class="card" style="display:none"></div>
    <div id="tab-list" class="word-list" style="display:none">
      <div id="word-list-content"></div>
    </div>
  </div>

  <!-- SESSION -->
  <div id="screen-session" class="screen">
    <div class="session-header">
      <button class="back-btn" onclick="exitSession()">✕</button>
      <div class="progress-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
      <span class="progress-text" id="progress-text">1/20</span>
    </div>
    <div class="question-area">
      <div class="review-badge" id="review-badge" style="display:none">🔁 复习中</div>
      <div class="streak-dots" id="session-streak-dots"></div>
      <div class="chinese-word" id="chinese-word">苹果</div>
      <p class="question-hint">请拼出英文单词</p>
      <div class="letter-count" id="letter-count">共 ? 个字母</div>
      <input type="text" id="answer-input" placeholder="在这里输入..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <div class="correct-answer" id="correct-answer" style="display:none"></div>
      <div class="session-btns">
        <button class="hint-btn" onclick="speakWord()">🔊 发音</button>
        <button class="submit-btn" id="submit-btn" onclick="submitAnswer()">确认 ✓</button>
      </div>
      <div class="feedback-banner" id="feedback-banner" style="display:none"></div>
    </div>
  </div>

  <!-- RESULT -->
  <div id="screen-result" class="screen">
    <div class="result-header">
      <div class="score-circle">
        <span class="score-pct" id="result-pct">0%</span>
        <span class="score-label" id="result-fraction">0/20</span>
      </div>
      <h2 class="result-title" id="result-title">完成！</h2>
      <p class="result-sub">本轮 Spelling 已完成</p>
    </div>
    <div class="wrong-section">
      <div class="section-label" style="margin-bottom:8px">❌ 答错的词（将重点复习）</div>
      <div id="wrong-words-list"></div>
    </div>
    <div class="result-actions">
      <button class="big-btn" onclick="startSession()">
        <span class="big-btn-icon">🔄</span>
        <div><div class="big-btn-title">再来一轮</div><div class="big-btn-sub">包含旧词复习</div></div>
      </button>
      <button class="big-btn secondary" onclick="showScreen('home')">
        <span class="big-btn-icon">🏠</span>
        <div><div class="big-btn-title">回到主页</div><div class="big-btn-sub">稍后再练</div></div>
      </button>
    </div>
  </div>

  <!-- TRANSFER -->
  <div id="screen-transfer" class="screen">
    <div class="top-bar">
      <button class="back-btn" onclick="showScreen('home')">← 返回</button>
      <div class="page-title">资料转移</div>
      <div style="width:60px"></div>
    </div>
    <div class="transfer-section">
      <p style="color:var(--text3);font-size:13px;line-height:1.6">换手机或备份词库，可以导出成文件，再在新手机导入回来。</p>
      <button class="transfer-btn" onclick="exportData()">
        <span style="font-size:24px">📤</span>
        <div><div style="font-weight:800">导出词库</div><div style="font-size:12px;color:var(--text3);margin-top:2px">下载 JSON 文件到手机</div></div>
      </button>
      <button class="transfer-btn" onclick="document.getElementById('import-input').click()">
        <span style="font-size:24px">📥</span>
        <div><div style="font-weight:800">导入词库</div><div style="font-size:12px;color:var(--text3);margin-top:2px">从 JSON 文件恢复</div></div>
      </button>
      <input type="file" id="import-input" accept=".json" style="display:none" onchange="importData(event)">
      <div class="divider"></div>
      <p class="card-label">或者复制文字备份</p>
      <textarea id="export-text" rows="6" placeholder="点击「生成备份文字」" style="font-size:12px;font-family:monospace"></textarea>
      <button class="add-btn" onclick="generateTextBackup()">生成备份文字</button>
      <button class="add-btn" style="background:var(--surface);border:1px solid var(--border);color:var(--text)" onclick="importFromText()">从文字恢复</button>
    </div>
  </div>

</div>

<script>
// ══════════════════════════════════════════════════
// PRESET BANKS
// ══════════════════════════════════════════════════
const PRESET_BANKS = {
  "小学基础词 (P1-P3)": [
    {en:"apple",zh:"苹果"},{en:"bird",zh:"鸟"},{en:"cat",zh:"猫"},
    {en:"dog",zh:"狗"},{en:"egg",zh:"蛋"},{en:"fish",zh:"鱼"},
    {en:"girl",zh:"女孩"},{en:"hat",zh:"帽子"},{en:"jump",zh:"跳"},
    {en:"kite",zh:"风筝"},{en:"lamp",zh:"灯"},{en:"milk",zh:"牛奶"},
    {en:"nest",zh:"鸟巢"},{en:"open",zh:"打开"},{en:"park",zh:"公园"},
    {en:"rain",zh:"雨"},{en:"sun",zh:"太阳"},{en:"tree",zh:"树"},
    {en:"umbrella",zh:"雨伞"},{en:"water",zh:"水"},{en:"box",zh:"箱子"},
    {en:"yellow",zh:"黄色"},{en:"zoo",zh:"动物园"},{en:"book",zh:"书"},
    {en:"cake",zh:"蛋糕"},{en:"door",zh:"门"},{en:"farm",zh:"农场"},
    {en:"gate",zh:"大门"},{en:"hand",zh:"手"},{en:"ice",zh:"冰"},
  ],
  "小学进阶词 (P4-P6)": [
    {en:"adventure",zh:"冒险"},{en:"beautiful",zh:"美丽的"},{en:"careful",zh:"小心的"},
    {en:"dangerous",zh:"危险的"},{en:"excellent",zh:"优秀的"},{en:"friendly",zh:"友善的"},
    {en:"grateful",zh:"感激的"},{en:"horrible",zh:"可怕的"},{en:"important",zh:"重要的"},
    {en:"jealous",zh:"嫉妒的"},{en:"knowledge",zh:"知识"},{en:"laughter",zh:"笑声"},
    {en:"mountain",zh:"山"},{en:"necessary",zh:"必要的"},{en:"ordinary",zh:"普通的"},
    {en:"peaceful",zh:"和平的"},{en:"question",zh:"问题"},{en:"remember",zh:"记得"},
    {en:"surprise",zh:"惊喜"},{en:"together",zh:"一起"},{en:"vacation",zh:"假期"},
    {en:"wonderful",zh:"精彩的"},{en:"excited",zh:"兴奋的"},{en:"achieve",zh:"达成"},
    {en:"between",zh:"之间"},{en:"century",zh:"世纪"},{en:"discuss",zh:"讨论"},
    {en:"energy",zh:"能量"},{en:"forest",zh:"森林"},{en:"gather",zh:"聚集"},
  ],
  "中学词汇 (F1-F3)": [
    {en:"accomplish",zh:"完成/实现"},{en:"benefit",zh:"利益/好处"},{en:"character",zh:"性格/特点"},
    {en:"describe",zh:"描述"},{en:"environment",zh:"环境"},{en:"fortunate",zh:"幸运的"},
    {en:"government",zh:"政府"},{en:"however",zh:"然而"},{en:"influence",zh:"影响"},
    {en:"journey",zh:"旅程"},{en:"language",zh:"语言"},{en:"material",zh:"材料/物质"},
    {en:"natural",zh:"自然的"},{en:"opportunity",zh:"机会"},{en:"participate",zh:"参与"},
    {en:"quality",zh:"品质/质量"},{en:"responsible",zh:"负责任的"},{en:"solution",zh:"解决方案"},
    {en:"tradition",zh:"传统"},{en:"understand",zh:"理解"},{en:"various",zh:"各种各样的"},
    {en:"wisdom",zh:"智慧"},{en:"experience",zh:"经验/经历"},{en:"appreciate",zh:"欣赏/感激"},
    {en:"brilliant",zh:"才华横溢的"},{en:"challenge",zh:"挑战"},{en:"develop",zh:"发展/开发"},
    {en:"encourage",zh:"鼓励"},{en:"failure",zh:"失败"},{en:"genuine",zh:"真诚的"},
  ],
};

// ══════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════
let wordBank = [];
let sessionWords = [];
let currentIdx = 0;
let sessionResults = [];
let feedbackActive = false;

const STORAGE_KEY = 'spelling_master_data';

// ══════════════════════════════════════════════════
// STORAGE
// ══════════════════════════════════════════════════
function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ wordBank }));
}

function loadData() {
  try {
    const d = localStorage.getItem(STORAGE_KEY);
    if (d) {
      const parsed = JSON.parse(d);
      wordBank = parsed.wordBank || [];
    }
  } catch(e) { wordBank = []; }
}

// ══════════════════════════════════════════════════
// UI HELPERS
// ══════════════════════════════════════════════════
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  if (name === 'home') updateHome();
  if (name === 'manage') updateListTab();
}

function toast(msg, type='info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = type === 'error' ? '#ef4444' : type === 'success' ? '#22c55e' : '#6366f1';
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}

function streakDotsHTML(streak, large='') {
  let html = '<div class="streak-dots">';
  for (let i = 0; i < 3; i++) {
    html += `<div class="dot ${large} ${i < streak ? 'filled' : ''}"></div>`;
  }
  return html + '</div>';
}

// ══════════════════════════════════════════════════
// HOME
// ══════════════════════════════════════════════════
function updateHome() {
  const mastered = wordBank.filter(w => (w.streak||0) >= 3).length;
  const struggling = wordBank.filter(w => w.totalAttempts > 0 && (w.streak||0) < 3).length;
  const fresh = wordBank.filter(w => !w.totalAttempts).length;
  document.getElementById('stat-total').textContent = wordBank.length;
  document.getElementById('stat-mastered').textContent = mastered;
  document.getElementById('stat-struggling').textContent = struggling;
  document.getElementById('stat-fresh').textContent = fresh;
  document.getElementById('session-sub').textContent = `每轮 ${Math.min(wordBank.length, 20)} 题`;

  const pills = document.getElementById('struggling-pills');
  const sw = wordBank.filter(w => w.totalAttempts > 0 && (w.streak||0) < 3).slice(0, 8);
  pills.innerHTML = sw.map(w => `
    <div class="word-pill">
      <span class="pill-en">${w.en}</span>
      <span class="pill-streak">${'★'.repeat(w.streak||0)}${'☆'.repeat(3-(w.streak||0))}</span>
    </div>`).join('');

  document.getElementById('list-tab-btn').textContent = `📋 词库(${wordBank.length})`;
}

// ══════════════════════════════════════════════════
// MANAGE TABS
// ══════════════════════════════════════════════════
function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-add').style.display = name === 'add' ? 'flex' : 'none';
  document.getElementById('tab-preset').style.display = name === 'preset' ? 'flex' : 'none';
  document.getElementById('tab-list').style.display = name === 'list' ? 'block' : 'none';
  if (name === 'preset') buildPresetTab();
  if (name === 'list') updateListTab();
}

function buildPresetTab() {
  const div = document.getElementById('tab-preset');
  div.innerHTML = Object.keys(PRESET_BANKS).map(name => `
    <div class="preset-item">
      <div>
        <div class="preset-name">${name}</div>
        <div class="preset-count">${PRESET_BANKS[name].length} 个词</div>
      </div>
      <button class="preset-btn" onclick="addPreset('${name}')">添加</button>
    </div>`).join('');
}

function updateListTab() {
  document.getElementById('list-tab-btn').textContent = `📋 词库(${wordBank.length})`;
  const div = document.getElementById('word-list-content');
  if (wordBank.length === 0) {
    div.innerHTML = '<p class="empty">词库是空的，请先添加词语</p>';
    return;
  }
  div.innerHTML = wordBank.map((w,i) => `
    <div class="word-row">
      <div>
        <div class="word-en">${w.en}</div>
        <div class="word-zh">${w.zh}</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        ${streakDotsHTML(w.streak||0)}
        <button class="delete-btn" onclick="deleteWord(${i})">✕</button>
      </div>
    </div>`).join('');
}

// ══════════════════════════════════════════════════
// ADD WORDS
// ══════════════════════════════════════════════════
function addWord() {
  const en = document.getElementById('input-en').value.trim().toLowerCase();
  const zh = document.getElementById('input-zh').value.trim();
  if (!en || !zh) { toast('请填写英文和华文！', 'error'); return; }
  if (wordBank.some(w => w.en === en)) { toast('这个词已经存在了！', 'error'); return; }
  wordBank.push({ en, zh, streak: 0, totalAttempts: 0, totalCorrect: 0 });
  saveData(); updateListTab(); updateHome();
  document.getElementById('input-en').value = '';
  document.getElementById('input-zh').value = '';
  toast('✅ 词语已添加！', 'success');
}

function bulkAdd() {
  const lines = document.getElementById('bulk-input').value.split('\n').map(l => l.trim()).filter(Boolean);
  let added = 0, skipped = 0;
  for (const line of lines) {
    const parts = line.split(/[,，\t]+/);
    if (parts.length < 2) { skipped++; continue; }
    const en = parts[0].trim().toLowerCase();
    const zh = parts[1].trim();
    if (!en || !zh || wordBank.some(w => w.en === en)) { skipped++; continue; }
    wordBank.push({ en, zh, streak: 0, totalAttempts: 0, totalCorrect: 0 });
    added++;
  }
  saveData(); updateListTab(); updateHome();
  document.getElementById('bulk-input').value = '';
  toast(`✅ 添加了 ${added} 个词${skipped > 0 ? `，跳过 ${skipped}` : ''}`, added > 0 ? 'success' : 'error');
}

function addPreset(bankName) {
  let added = 0;
  for (const w of PRESET_BANKS[bankName]) {
    if (!wordBank.some(x => x.en === w.en)) {
      wordBank.push({ ...w, streak: 0, totalAttempts: 0, totalCorrect: 0 });
      added++;
    }
  }
  saveData(); updateListTab(); updateHome();
  toast(`✅ 已添加 ${added} 个词！`, 'success');
}

function deleteWord(idx) {
  wordBank.splice(idx, 1);
  saveData(); updateListTab(); updateHome();
  toast('已删除');
}

// ══════════════════════════════════════════════════
// SESSION
// ══════════════════════════════════════════════════
function buildSession() {
  if (wordBank.length === 0) return [];
  const struggling = wordBank.filter(w => w.totalAttempts > 0 && (w.streak||0) < 3);
  const fresh = wordBank.filter(w => !w.totalAttempts);
  const mastered = wordBank.filter(w => (w.streak||0) >= 3);

  let pool = [];
  struggling.forEach(w => pool.push(w, w));
  fresh.forEach(w => pool.push(w));
  mastered.forEach(w => { if (Math.random() < 0.3) pool.push(w); });
  pool = pool.sort(() => Math.random() - 0.5);

  const seen = new Set();
  const result = [];
  for (const w of pool) {
    if (!seen.has(w.en) && result.length < 20) { seen.add(w.en); result.push({...w}); }
  }
  for (const w of wordBank) {
    if (!seen.has(w.en) && result.length < 20) { seen.add(w.en); result.push({...w}); }
  }
  return result.slice(0, 20);
}

function startSession() {
  if (wordBank.length === 0) { toast('请先添加词语！', 'error'); return; }
  sessionWords = buildSession();
  currentIdx = 0;
  sessionResults = [];
  feedbackActive = false;
  showScreen('session');
  renderQuestion();
}

function renderQuestion() {
  const w = sessionWords[currentIdx];
  const pct = (currentIdx / sessionWords.length) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${currentIdx+1}/${sessionWords.length}`;
  document.getElementById('chinese-word').textContent = w.zh;
  document.getElementById('letter-count').textContent = `共 ${w.en.length} 个字母`;
  document.getElementById('answer-input').value = '';
  document.getElementById('answer-input').className = '';
  document.getElementById('answer-input').disabled = false;
  document.getElementById('correct-answer').style.display = 'none';
  document.getElementById('feedback-banner').style.display = 'none';
  document.getElementById('submit-btn').disabled = false;
  feedbackActive = false;

  const isStruggling = w.totalAttempts > 0 && (w.streak||0) < 3;
  document.getElementById('review-badge').style.display = isStruggling ? 'block' : 'none';

  const dots = document.getElementById('session-streak-dots');
  dots.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const d = document.createElement('div');
    d.className = 'dot large' + (i < (w.streak||0) ? ' filled' : '');
    dots.appendChild(d);
  }
  setTimeout(() => document.getElementById('answer-input').focus(), 100);
}

function submitAnswer() {
  if (feedbackActive) return;
  const input = document.getElementById('answer-input').value.trim();
  if (!input) return;
  const w = sessionWords[currentIdx];
  const isCorrect = input.toLowerCase() === w.en.toLowerCase();
  feedbackActive = true;

  document.getElementById('answer-input').className = isCorrect ? 'correct' : 'wrong';
  document.getElementById('answer-input').disabled = true;
  document.getElementById('submit-btn').disabled = true;

  if (!isCorrect) {
    document.getElementById('correct-answer').textContent = `正确答案：${w.en}`;
    document.getElementById('correct-answer').style.display = 'block';
  }

  const fb = document.getElementById('feedback-banner');
  fb.textContent = isCorrect ? '🎉 答对了！' : '❌ 再接再厉！';
  fb.className = 'feedback-banner ' + (isCorrect ? 'correct' : 'wrong');
  fb.style.display = 'block';

  sessionResults.push({ word: w, correct: isCorrect });

  // Update streak
  const idx = wordBank.findIndex(x => x.en === w.en);
  if (idx !== -1) {
    wordBank[idx].streak = isCorrect ? (wordBank[idx].streak||0) + 1 : 0;
    wordBank[idx].totalAttempts = (wordBank[idx].totalAttempts||0) + 1;
    wordBank[idx].totalCorrect = (wordBank[idx].totalCorrect||0) + (isCorrect ? 1 : 0);
    saveData();
  }

  setTimeout(() => {
    currentIdx++;
    if (currentIdx >= sessionWords.length) showResult();
    else renderQuestion();
  }, isCorrect ? 900 : 1800);
}

function exitSession() {
  showScreen('home');
}

function speakWord() {
  const w = sessionWords[currentIdx];
  if (!w) return;
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(w.en);
    u.lang = 'en-US'; u.rate = 0.85;
    window.speechSynthesis.speak(u);
  }
}

// ══════════════════════════════════════════════════
// RESULT
// ══════════════════════════════════════════════════
function showResult() {
  const correct = sessionResults.filter(r => r.correct).length;
  const total = sessionResults.length;
  const pct = Math.round((correct/total)*100);
  document.getElementById('result-pct').textContent = pct + '%';
  document.getElementById('result-fraction').textContent = `${correct}/${total}`;
  document.getElementById('result-title').textContent =
    pct === 100 ? '🏆 完美！' : pct >= 80 ? '🎉 非常棒！' : pct >= 60 ? '👍 继续加油！' : '💪 继续练习！';

  const wrongWords = sessionResults.filter(r => !r.correct);
  const div = document.getElementById('wrong-words-list');
  div.innerHTML = wrongWords.map(r => `
    <div class="wrong-row">
      <span class="wrong-zh">${r.word.zh}</span>
      <span class="wrong-en">${r.word.en}</span>
      ${streakDotsHTML(0)}
    </div>`).join('');

  showScreen('result');
}

// ══════════════════════════════════════════════════
// TRANSFER
// ══════════════════════════════════════════════════
function exportData() {
  const data = JSON.stringify({ wordBank, exportedAt: new Date().toISOString() }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `spelling-master-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('✅ 词库已导出！', 'success');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.wordBank) { toast('文件格式错误！', 'error'); return; }
      let added = 0;
      for (const w of data.wordBank) {
        if (!wordBank.some(x => x.en === w.en)) {
          wordBank.push(w); added++;
        }
      }
      saveData(); updateHome();
      toast(`✅ 导入了 ${added} 个词！`, 'success');
    } catch(e) { toast('导入失败，文件有误！', 'error'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function generateTextBackup() {
  const text = wordBank.map(w => `${w.en},${w.zh},${w.streak||0},${w.totalAttempts||0}`).join('\n');
  document.getElementById('export-text').value = text;
  toast('✅ 备份文字已生成，复制保存', 'success');
}

function importFromText() {
  const text = document.getElementById('export-text').value.trim();
  if (!text) { toast('请先粘贴备份文字！', 'error'); return; }
  const lines = text.split('\n');
  let added = 0;
  for (const line of lines) {
    const parts = line.split(',');
    if (parts.length < 2) continue;
    const en = parts[0].trim().toLowerCase();
    const zh = parts[1].trim();
    const streak = parseInt(parts[2])||0;
    const totalAttempts = parseInt(parts[3])||0;
    if (!wordBank.some(w => w.en === en)) {
      wordBank.push({ en, zh, streak, totalAttempts, totalCorrect: 0 });
      added++;
    }
  }
  saveData(); updateHome();
  toast(`✅ 恢复了 ${added} 个词！`, 'success');
}

// ══════════════════════════════════════════════════
// KEYBOARD
// ══════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (document.getElementById('screen-session').classList.contains('active')) {
    if (e.key === 'Enter' && !feedbackActive) submitAnswer();
  }
  if (document.getElementById('screen-manage').classList.contains('active')) {
    if (e.key === 'Enter' && document.activeElement.id === 'input-zh') addWord();
  }
});

// ══════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════
loadData();
updateHome();
buildPresetTab();
</script>
